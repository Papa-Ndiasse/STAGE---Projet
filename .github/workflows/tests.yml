name: Tests API GoREST

on:
  schedule:
    - cron: '*/5 * * * *'   # tous les jours à 8h UTC (= 10h à Paris en été)
  workflow_dispatch:       # permet aussi de lancer manuellement depuis GitHub

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer Newman et le reporter HTML
        run: npm install -g newman newman-reporter-htmlextra

      - name: Lancer la collection Postman
        run: newman run collection.json -e environment.json -r htmlextra --reporter-htmlextra-export report.html

      - name: Sauvegarder le rapport
        uses: actions/upload-artifact@v4
        with:
          name: rapport-tests
          path: report.html
